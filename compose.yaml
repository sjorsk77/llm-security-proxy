services:
  dashboard:
    container_name: llm-security-dashboard
    build:
      context: .
      dockerfile: Dashboard/Dockerfile
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

  proxy:
    container_name: llm-security-proxy
    build:
      context: .
      dockerfile: Proxy/Dockerfile
    ports:
      - "8000:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: always

volumes:
  sqlite-data:
